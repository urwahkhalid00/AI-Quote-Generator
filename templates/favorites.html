<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Favorite Quotes</title>

</head>

<body>

    <h1>My Favorite Quotes</h1>

    <hr>

    {% if quotes %}

        {% for quote in quotes %}

            <h3>{{ quote[1] }}</h3>

            <p>{{ quote[2] }}</p>

            <small>{{ quote[3] }}</small>

            <hr>

        {% endfor %}

    {% else %}

        <h2>No Favorite Quotes Yet</h2>

    {% endif %}

</body>

</html>
